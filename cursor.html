<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            background-color: transparent;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>
    <img
        src="https://raw.githubusercontent.com/pedrohenriqueljs-cyber/cursor_zn4x/main/cursor_icon.png"
        alt=""
        draggable="false"
    />
</body>
</html>
